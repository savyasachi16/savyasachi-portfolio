<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <style>
      @media (prefers-color-scheme: dark) {
        .bg { fill: #0c0f14; }
        .circle { stroke: #7eb8f7; }
        .text { fill: #7eb8f7; }
      }
      @media (prefers-color-scheme: light) {
        .bg { fill: #f0f5fc; }
        .circle { stroke: #3b82c4; }
        .text { fill: #3b82c4; }
      }
    </style>
  </defs>
  <rect class="bg" width="200" height="200"/>
  <circle class="circle" cx="100" cy="100" r="85" fill="none" stroke-width="3"/>
  <text class="text" x="100" y="120" font-family="Syne, system-ui, sans-serif" font-size="90" font-weight="700" text-anchor="middle">SJ</text>
</svg>
